name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  test:
      name: Test (Node ${{ matrix.node-version }})
      runs-on: ubuntu-latest
      needs: lint

      strategy:
        fail-fast: false
        matrix:
          node-version: [20, 22]

      steps:
        - uses: actions/checkout@v4

        - name: Set up Node.js ${{matrix.node-version}}
          uses: actions/setup-node@v4
          with: 
            node-version: ${{matrix.node-version}}
            cache: npm

        - name: Install dependencies
          run: npm ci

        - name: Run tests
          run: npm test
          env:
            DATABASE_URL: "hardcoded-value"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: 20
          cache: "npm"
        
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "hardcoded-value"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7
          


